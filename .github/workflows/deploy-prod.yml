name: Deploy to Production

on:
    push:
        branches: [main, master]
    workflow_dispatch: # Allow manual trigger

jobs:
    build-and-deploy:
        runs-on: [self-hosted]

        env:
            IMAGE_LOCAL: localhost:5000/ai-ml-room
            IMAGE_REGISTRY: registry.homelab.local/ai-ml-room

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Build Docker image
              run: |
                  docker build -f Dockerfile . \
                    -t $IMAGE_LOCAL:prod-${{ github.sha }} \
                    -t $IMAGE_LOCAL:prod-latest \
                    -t $IMAGE_REGISTRY:prod-${{ github.sha }} \
                    -t $IMAGE_REGISTRY:prod-latest

            - name: Push to registry
              run: |
                  docker push $IMAGE_LOCAL:prod-latest
                  docker push $IMAGE_LOCAL:prod-${{ github.sha }}

                  docker push $IMAGE_REGISTRY:prod-latest
                  docker push $IMAGE_REGISTRY:prod-${{ github.sha }}

            - name: Verify image
              run: |
                  echo "Production images pushed successfully:"
                  echo "  - $IMAGE_REGISTRY:prod-${{ github.sha }}"
                  echo "  - $IMAGE_REGISTRY:prod-latest"

            - name: Verify image is pullable
              run: |
                  docker pull $IMAGE_REGISTRY:prod-${{ github.sha }}
                  echo "✓ Image pull successful"

            - name: Deploy to Production Kubernetes
              run: |
                  kubectl apply -f k8s/namespaces.yaml
                  kubectl apply -f k8s/prod/service.yaml
                  kubectl apply -f k8s/prod/deployment.yaml
                  kubectl apply -f k8s/prod/ingress.yaml

            - name: Update deployment image
              run: |
                  kubectl set image deployment/ai-ml-room-prod \
                    ai-ml-room=$IMAGE_REGISTRY:prod-${{ github.sha }} \
                    -n prod
                  echo "Updated prod deployment to: registry.homelab.local/ai-ml-room:prod-${{ github.sha }}"

            - name: Check pod status
              if: always()
              run: |
                  echo "Checking production pod status..."
                  kubectl get pods -n prod -l app=ai-ml-room
                  kubectl describe pods -n prod -l app=ai-ml-room | tail -50

            - name: Wait for rollout
              run: |
                  kubectl rollout status deployment/ai-ml-room-prod -n prod --timeout=5m

            - name: Verify deployment
              run: |
                  echo "Production deployment completed successfully!"
                  kubectl get pods -n prod -l app=ai-ml-room -o wide
                  kubectl get svc -n prod ai-ml-room-service
                  kubectl get ingress -n prod ai-ml-room-ingress

            - name: Deployment summary
              run: |
                  echo "========================================="
                  echo "🚀 Production Deployment Complete!"
                  echo "========================================="
                  echo "Image: $IMAGE_REGISTRY:prod-${{ github.sha }}"
                  echo "URL: https://ai-ml.tfdevs.com"
                  echo "Replicas: $(kubectl get deployment ai-ml-room-prod -n prod -o jsonpath='{.status.readyReplicas}')/$(kubectl get deployment ai-ml-room-prod -n prod -o jsonpath='{.spec.replicas}')"
                  echo "========================================="
